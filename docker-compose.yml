services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ekahal-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: sh ./deploy.sh

  db:
    image: mysql:8.4
    container_name: ekahal-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ekahal_products
      MYSQL_USER: ekahal
      MYSQL_PASSWORD: ekahal
    ports:
      - "3308:3306"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  dbdata:
